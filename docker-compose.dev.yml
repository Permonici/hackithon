services:
  frontend-dev:
    image: node:22-alpine
    container_name: xdent-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  frontend_node_modules:
